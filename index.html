<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pocket Planet — explore a spherical 3D world with dynamic gravity and day/night."
    />
    <title>Pocket Planet</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="blocker" class="backdrop-blur-sm transition-opacity duration-300">
      <h1 class="text-5xl font-bold mb-4 text-emerald-400 drop-shadow-md">
        Pocket Planet
      </h1>
      <p class="text-xl mb-8 text-slate-200">A spherical 3D world</p>

      <div
        class="bg-slate-800/80 p-6 rounded-xl border border-slate-600 mb-8 max-w-md text-center"
      >
        <h2 class="text-2xl font-semibold mb-4 text-emerald-300">Controls</h2>
        <div class="grid grid-cols-2 gap-4 text-left text-slate-300">
          <div class="flex items-center gap-2">
            <span
              class="bg-slate-700 px-2 py-1 rounded border border-slate-500 font-mono"
              >W A S D</span
            >
            Move
          </div>
          <div class="flex items-center gap-2">
            <span
              class="bg-slate-700 px-2 py-1 rounded border border-slate-500 font-mono"
              >Mouse</span
            >
            Look Around
          </div>
          <div class="col-span-2 text-sm text-slate-400 mt-2">
            * Notice how gravity dynamically adjusts to the center of the planet.
          </div>
        </div>
      </div>

      <button
        id="startButton"
        type="button"
        class="px-8 py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-full text-xl transition-all hover:scale-105 hover:shadow-[0_0_20px_rgba(16,185,129,0.5)]"
        aria-label="Start game and lock pointer"
      >
        Click to Explore
      </button>
    </div>

    <div id="crosshair" aria-hidden="true"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
